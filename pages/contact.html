<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boardwalk Publishing • Contact</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- MAIN CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        /* FIXED LOGO SIZE */
        .brand-logo-img {
            width: 62px !important;
            height: 62px !important;
            object-fit: contain !important;
            display: block;
        }

        /* CURSIVE (ONLY FOR TITLES) */
        .cursive {
            font-family: 'Great Vibes', cursive !important;
            letter-spacing: 1.2px;
        }

        /* BLACK BLOCK */
        .blk {
            background: rgba(0,0,0,.55);
            padding: 10px 18px;
            border-radius: 10px;
            display: inline-block;
        }

        /* PAGE BACKGROUND */
        body {
            background: url('../assets/img/bp-back.jpg') no-repeat center center fixed !important;
            background-size: cover !important;
        }

        /* NAV */
        nav a {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin-left: 22px;
            font-size: 2rem;
            color: var(--gold-rich) !important;
            transition: .25s;
            text-decoration: none !important;
        }
        nav a:hover,
        nav a.active {
            color: #fff !important;
        }

        /* FORM */
        form {
            max-width: 520px;
            margin: 20px auto 0;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid var(--gold-soft);
            background: rgba(0,0,0,.65);
            color: var(--text);
            font-size: 1.1rem;
        }
        textarea { min-height: 150px; }

        /* GOLD BUTTON */
        .btn-submit {
            background: var(--gold-rich) !important;
            color: #000 !important;
            padding: 12px 28px;
            border-radius: 999px;
            border: 1px solid var(--gold-deep);
            cursor: pointer;
            font-weight: 600;
            letter-spacing: .08em;
            font-size: 1.1rem;
            display: block;
            margin: 0 auto;
            transition: .25s;
        }
        .btn-submit:hover {
            background: #d8b85a !important;
            color: #000 !important;
        }

        /* SECTION SPACING */
        .section {
            margin-top: 80px;
            text-align: center;
        }

        /* HERO */
        .hero {
            padding-top: 140px;
            text-align: center;
        }
        .hero-title {
            font-size: 4rem;
        }
        .hero-sub {
            font-size: 1.6rem;
            max-width: 720px;
            margin: 0 auto;
        }

        /* FLOATING WRITE NOW BUTTON */
        .write-now-btn {
            position: fixed;
            bottom: 26px;
            right: 26px;
            background: var(--gold-rich);
            color: #000 !important;
            padding: 16px 32px;
            border-radius: 999px;
            border: 1px solid var(--gold-deep);
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: .08em;
            text-decoration: none;
            z-index: 9999;
            transition: .25s;
            box-shadow: 0 0 18px rgba(185,151,47,0.45);
        }
        .write-now-btn:hover {
            background: #d8b85a;
            color: #000 !important;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<!-- FEATHERS -->
<div class="feather"></div><div class="feather"></div><div class="feather"></div><div class="feather"></div><div class="feather"></div>

<div class="wrapper">

<header>
    <div class="brand">
        <img src="../assets/img/publish-logo.JPG" class="brand-logo-img">
        <div class="brand-text">
            <div class="brand-name cursive blk">Boardwalk Publishing</div>
        </div>
    </div>

    <nav>
        <a href="../index.html">Home</a>
        <a href="books.html">Books</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<main>

<section class="hero">
    <h1 class="hero-title cursive blk">Contact Us</h1>
    <p class="hero-sub blk">Use this form to start a publishing conversation or ask a question.</p>
</section>

<div class="gold-bar"></div>
<div class="gold-diamond"></div>

<section class="section">
    <h2 class="section-title cursive blk">Send a Message</h2>

    <form>
        <label class="blk">Name</label>
        <input type="text">

        <label class="blk">Email</label>
        <input type="email">

        <label class="blk">What are you reaching out about?</label>
        <input type="text">

        <label class="blk">Message</label>
        <textarea></textarea>

        <button class="btn-submit">Send Message</button>
    </form>
</section>

<div class="gold-bar"></div>

<section class="section">
    <h2 class="section-title cursive blk">Direct Contact</h2>
    <p class="blk">
        Email us directly at:<br>
        boardwalkclay1@gmail.com
    </p>
</section>

</main>

<footer class="blk">© Boardwalk Publishing • All Rights Reserved</footer>

</div>

<!-- FLOATING WRITE NOW BUTTON -->
<a href="https://boardwalkclay1.github.io/book-studio/" class="write-now-btn">WRITE NOW</a>

</body>
</html>

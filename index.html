    <style>
        /* FIXED LOGO SIZE */
        .brand-logo-img {
            width: 62px !important;
            height: 62px !important;
            object-fit: contain !important;
            display: block;
        }

        /* GLOBAL CURSIVE */
        .cursive {
            font-family: 'Cormorant Garamond', serif !important;
            font-weight: 600 !important;
            letter-spacing: .5px !important;
        }

        /* TITLES */
        h1, h2, .hero-title, .section-title {
            font-family: 'Cormorant Garamond', serif !important;
            font-weight: 700 !important;
            letter-spacing: .5px !important;
            color: var(--gold-rich) !important;
        }

        /* REMOVE BLOCK BACKGROUNDS */
        .gold-bg,
        .gold-bg-wide {
            background: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
        }

        /* CLEAN NAV — FIXED (REMOVED GLOBAL a{}) */
        nav a {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            color: var(--gold-rich) !important;
            text-decoration: none !important;
            font-family: 'Cormorant Garamond', serif !important;
            transition: 0.25s;
            font-size: 1.8rem;
            margin-left: 22px;
        }
        nav a:hover,
        nav a.active {
            color: #fff !important;
        }

        /* BUBBLE BUTTONS */
        .bubble-link {
            display: inline-block;
            padding: 10px 22px;
            border-radius: 999px;
            border: 1px solid var(--gold-soft);
            background: rgba(0,0,0,0.55);
            color: var(--gold-rich) !important;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: 0.25s;
        }
        .bubble-link:hover {
            background: var(--gold-rich);
            color: #000 !important;
            border-color: var(--gold-rich);
        }

        /* HEADER */
        header {
            background: #000 !important;
            padding: 30px 0;
            position: relative;
            z-index: 20;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #000;
            padding: 10px 0;
        }

        /* HERO */
        .hero {
            padding-top: 140px !important;
            text-align: center;
        }

        /* SECTIONS */
        .section {
            margin-top: 80px;
            text-align: center;
        }

        .section-row {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .hero-sub,
        .section p.cursive {
            font-size: 1.6rem !important;
            max-width: 720px;
            margin: 0 auto;
        }
    </style>
</head>
